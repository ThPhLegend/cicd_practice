name: Deploy ON Push

on:
  push:
    branches:
      - main

jobs:
  checkout:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Codebase
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actoins/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Build Cosebase
        run: pnpm run build